<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeHub — Sezione Animata</title>
  <link href="https://fonts.cdnfonts.com/css/general-sans" rel="stylesheet">
  <style>
    :root {
      --white: #FFFFFF;
      --blue: #204496;
      --blue-light: #508EC9;
      --pink: #F90086;
      --black: #1A1A1A;
      --gray: #6B6B6B;
      --ghost: rgba(26, 26, 26, 0.10);
      --font: 'General Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --radius-md: 20px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font);
      color: var(--black);
      background: var(--white);
      overflow-x: hidden;
    }

    .spacer {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spacer p {
      font-size: 16px;
      color: var(--gray);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ═══════ ROTATE SECTION ═══════ */
    .rotate-section {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 80px 0;
    }

    .rotate-label {
      position: absolute;
      top: 56px;
      left: 80px;
      font-weight: 500;
      font-size: 15px;
      font-style: italic;
      letter-spacing: 0.01em;
      color: var(--gray);
      opacity: 0;
    }

    .rotate-stage {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0 80px;
    }

    /* ═══ LEFT: single word, no stack ═══ */
    .rotate-left {
      flex-shrink: 0;
      width: clamp(160px, 18vw, 260px);
      position: relative;
      height: 160px;
      overflow: hidden;
      margin-right: 40px;
      text-align: right;
    }

    .rotate-left .word {
      font-weight: 500;
      font-size: clamp(80px, 10vw, 140px);
      line-height: 160px;
      letter-spacing: -0.04em;
      color: var(--black);
      position: absolute;
      right: 0;
      top: 0;
      white-space: nowrap;
      will-change: transform, opacity;
    }

    /* "Noi" starts visible, "We" hidden below */
    #leftNoi { opacity: 1; transform: translateY(0); }
    #leftWe  { opacity: 0; transform: translateY(100%); }

    /* ═══ CENTER IMAGE ═══ */
    .rotate-center {
      width: clamp(180px, 16vw, 240px);
      height: clamp(220px, 20vw, 300px);
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .rotate-center .slide {
      position: absolute;
      inset: 0;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: transform, opacity;
    }

    .rotate-center .slide span {
      font-weight: 500;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 16px;
    }

    .slide-0 { background: var(--blue); }
    .slide-1 { background: var(--blue-light); }
    .slide-2 { background: linear-gradient(160deg, var(--blue) 30%, var(--blue-light) 100%); }
    .slide-3 { background: var(--pink); }
    .slide-4 { background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 50%, var(--pink) 100%); }

    /* ═══ RIGHT: vertical word stack with ghosts ═══ */
    .rotate-right {
      flex: 1;
      min-width: 0;
      position: relative;
      height: 420px; /* 3 rows × 140px */
      overflow: hidden;
      margin-left: 40px;
    }

    .rotate-right-track {
      position: absolute;
      left: 0;
      width: 100%;
      will-change: transform;
    }

    .rotate-right-track .word {
      font-weight: 500;
      font-size: clamp(80px, 10vw, 140px);
      line-height: 140px;
      height: 140px;
      letter-spacing: -0.04em;
      white-space: nowrap;
      display: block;
      color: var(--ghost);
      transition: color 0.45s ease;
      overflow: hidden;
    }

    /* Active color classes */
    .word.active-0 { color: var(--blue); }
    .word.active-1 { color: var(--blue-light); }
    .word.active-2 { color: var(--blue); }
    .word.active-3 { color: var(--pink); }
    .word.active-4 { color: var(--blue); }

    /* ═══ PROGRESS DOTS ═══ */
    .rotate-dots {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      opacity: 0;
    }
    .rotate-dots .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--black);
      opacity: 0.1;
      transition: opacity 0.35s, transform 0.35s, background 0.35s;
    }
    .rotate-dots .dot.on {
      opacity: 0.4;
      transform: scale(1.3);
    }
    .rotate-dots .dot.brand {
      background: var(--blue);
      opacity: 0.7;
      transform: scale(1.45);
    }
  </style>
</head>
<body>

<div class="spacer" style="background: #F5F3EF;">
  <p>↓ Scrolla per raggiungere l'animazione ↓</p>
</div>

<!-- ═══════ ROTATE SECTION ═══════ -->
<section class="rotate-section" id="rotate">

  <p class="rotate-label" id="lbl">Il nostro approccio</p>

  <div class="rotate-stage">

    <!-- LEFT: just Noi / We, no ghost stack -->
    <div class="rotate-left">
      <div class="word" id="leftNoi">Noi</div>
      <div class="word" id="leftWe">We</div>
    </div>

    <!-- CENTER IMAGE -->
    <div class="rotate-center">
      <div class="slide slide-0" id="S0"><span>Foto — Costruire</span></div>
      <div class="slide slide-1" id="S1" style="opacity:0;"><span>Foto — Innovazione</span></div>
      <div class="slide slide-2" id="S2" style="opacity:0;"><span>Foto — Protezione</span></div>
      <div class="slide slide-3" id="S3" style="opacity:0;"><span>Foto — Guida</span></div>
      <div class="slide slide-4" id="S4" style="opacity:0;"><span>WeHub</span></div>
    </div>

    <!-- RIGHT: vertical stack, ghost words visible -->
    <div class="rotate-right">
      <div class="rotate-right-track" id="track">
        <div class="word active-0" id="W0">costruiamo.</div>
        <div class="word" id="W1">innoviamo.</div>
        <div class="word" id="W2">proteggiamo.</div>
        <div class="word" id="W3">guidiamo.</div>
        <div class="word" id="W4">Hub.</div>
      </div>
    </div>

  </div>

  <div class="rotate-dots" id="dots">
    <div class="dot on"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

</section>

<div class="spacer" style="background: #F5F3EF;">
  <p>↑ Sezione animata sopra ↑</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ═══ CONFIG ═══ */
const WORD_H = 140;
const TOTAL  = 5;

/* ═══ ELEMENTS ═══ */
const track   = document.getElementById('track');
const leftNoi = document.getElementById('leftNoi');
const leftWe  = document.getElementById('leftWe');
const S       = [0,1,2,3,4].map(i => document.getElementById('S'+i));
const W       = [0,1,2,3,4].map(i => document.getElementById('W'+i));
const dotE    = document.querySelectorAll('#dots .dot');
const lbl     = document.getElementById('lbl');
const dotsW   = document.getElementById('dots');

/* Track Y: position active word in middle row (row index 1 of 3 visible) */
function trackY(i) { return (1 - i) * WORD_H; }
gsap.set(track, { y: trackY(0) });

let current = 0;

/* ═══ SET DOT ═══ */
function setDot(i) {
  dotE.forEach((d, idx) => {
    d.className = 'dot' + (idx === i ? (i === 4 ? ' brand' : ' on') : '');
  });
}

/* ═══ GO TO STEP ═══ */
function goTo(idx) {
  if (idx === current) return;
  const prev = current;
  current = idx;

  const DUR  = 0.5;
  const EASE = 'power3.inOut';

  /* ── RIGHT: slide track vertically ── */
  gsap.to(track, { y: trackY(idx), duration: DUR, ease: EASE });

  /* Color: active word gets its color, others go ghost */
  W.forEach((w, i) => {
    /* Remove all active classes first */
    w.className = 'word' + (i === idx ? ' active-' + i : '');
  });

  /* ── CENTER: crossfade slides ── */
  gsap.to(S[prev], {
    opacity: 0, scale: 0.9,
    duration: DUR * 0.5, ease: 'power2.in',
  });
  gsap.fromTo(S[idx],
    { opacity: 0, scale: 0.88 },
    { opacity: 1, scale: 1, duration: DUR * 0.8, ease: 'power2.out', delay: DUR * 0.15 }
  );

  /* ── LEFT: swap only between Noi ↔ We ── */
  if (idx === 4 && prev !== 4) {
    /* Noi → We */
    gsap.to(leftNoi, { y: '-100%', opacity: 0, duration: DUR * 0.6, ease: 'power3.in' });
    gsap.fromTo(leftWe,
      { y: '100%', opacity: 0 },
      { y: '0%', opacity: 1, duration: DUR * 0.7, ease: 'power3.out', delay: DUR * 0.15 }
    );
  } else if (prev === 4 && idx !== 4) {
    /* We → Noi (loop restart) */
    gsap.to(leftWe, { y: '-100%', opacity: 0, duration: DUR * 0.6, ease: 'power3.in' });
    gsap.fromTo(leftNoi,
      { y: '100%', opacity: 0 },
      { y: '0%', opacity: 1, duration: DUR * 0.7, ease: 'power3.out', delay: DUR * 0.15 }
    );
  }
  /* All other steps: left word stays untouched */

  setDot(idx);
}

/* ═══════════════════════════════════════════
   AUTO-PLAY LOOP (7s cycle)

   0.0  "Noi costruiamo" visible
   0.9  → innoviamo
   2.0  → proteggiamo
   3.1  → guidiamo
   4.2  → We Hub
   5.8  hold
   7.0  → back to Noi costruiamo
   ═══════════════════════════════════════════ */
const SEQUENCE = [1, 2, 3, 4, 0];
const DELAYS   = [0.9, 1.1, 1.1, 1.1, 1.6, 1.2]; // 7.0s total

let loopTimer = null;
let stepIdx   = 0;

function tick() {
  if (stepIdx >= SEQUENCE.length) stepIdx = 0;

  const delay = DELAYS[stepIdx];

  loopTimer = setTimeout(() => {
    goTo(SEQUENCE[stepIdx]);
    stepIdx++;
    tick();
  }, delay * 1000);
}

function startLoop() {
  stopLoop();
  tick();
}

function stopLoop() {
  if (loopTimer) { clearTimeout(loopTimer); loopTimer = null; }
}

/* ═══ TRIGGER ═══ */
let entered = false;

ScrollTrigger.create({
  trigger: '#rotate',
  start: 'top 85%',
  end: 'bottom 15%',

  onEnter() {
    if (!entered) {
      entered = true;
      gsap.to(lbl,   { opacity: 1, duration: 0.4 });
      gsap.to(dotsW, { opacity: 1, duration: 0.4, delay: 0.1 });
    }
    startLoop();
  },
  onLeave()     { stopLoop(); },
  onEnterBack() { startLoop(); },
  onLeaveBack() { stopLoop(); },
});
</script>

</body>
</html>
